<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Flashcard App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .offline-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #6c757d;
        }
        .cached-content {
            margin-top: 2rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="offline-icon">
                        <i class="bi bi-wifi-off"></i>
                    </div>
                    <h1 class="mb-4">You're Offline</h1>
                    <p class="lead mb-4">Don't worry! You can still access your cached flashcards and continue studying.</p>
                    
                    <div id="offlineContent" class="cached-content">
                        <h3 class="mb-3">Available Offline:</h3>
                        <div id="cachedDecks" class="list-group mb-4">
                            <!-- Cached decks will be listed here -->
                        </div>
                    </div>

                    <div class="alert alert-info" role="alert">
                        <i class="bi bi-info-circle me-2"></i>
                        Your progress will be synchronized when you're back online.
                    </div>

                    <button id="reloadBtn" class="btn btn-primary mt-3">
                        <i class="bi bi-arrow-clockwise me-2"></i>
                        Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check for cached content
        async function checkCachedContent() {
            try {
                const db = await openDB('flashcard-offline-db');
                const flashcards = await db.getAll('flashcards');
                
                if (flashcards.length > 0) {
                    document.getElementById('offlineContent').style.display = 'block';
                    const decksContainer = document.getElementById('cachedDecks');
                    
                    // Group flashcards by deck
                    const decks = flashcards.reduce((acc, card) => {
                        if (!acc[card.deckId]) {
                            acc[card.deckId] = [];
                        }
                        acc[card.deckId].push(card);
                        return acc;
                    }, {});

                    // Display available decks
                    Object.entries(decks).forEach(([deckId, cards]) => {
                        const deckElement = document.createElement('a');
                        deckElement.href = `/study.html?deck=${deckId}&offline=true`;
                        deckElement.className = 'list-group-item list-group-item-action';
                        deckElement.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-1">${cards[0].deckName}</h5>
                                <span class="badge bg-primary rounded-pill">${cards.length} cards</span>
                            </div>
                            <small class="text-muted">Last updated: ${new Date(cards[0].lastUpdated).toLocaleDateString()}</small>
                        `;
                        decksContainer.appendChild(deckElement);
                    });
                }
            } catch (error) {
                console.error('Error checking cached content:', error);
            }
        }

        // Reload page when clicking try again
        document.getElementById('reloadBtn').addEventListener('click', () => {
            window.location.reload();
        });

        // Check for cached content when page loads
        window.addEventListener('load', checkCachedContent);
    </script>
</body>
</html>
