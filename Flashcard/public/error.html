<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Flashcard App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background-color: var(--bs-light);
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--bs-danger);
        }
        [data-theme="dark"] {
            background-color: var(--bs-dark);
            color: var(--bs-light);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="error-icon">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h1 class="mb-4">Oops! Something went wrong</h1>
                    <p class="lead mb-4">We're experiencing technical difficulties. Please try again later.</p>
                    
                    <div class="alert alert-info" role="alert">
                        <i class="bi bi-info-circle me-2"></i>
                        Our team has been notified and is working to resolve the issue.
                    </div>

                    <button onclick="window.location.href='/'" class="btn btn-primary mt-3">
                        <i class="bi bi-house me-2"></i>
                        Return to Home
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Preserve theme preference
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</body>
</html>
