</head>
<body>

    <section id="ask-me" class="skills">
        <div class="container">

            <div class="skills-grid">
                <div class="skill-card">
                    <i class="fab fa-html5"></i>

                    <i class="fab fa-css3-alt"></i>
                    <h3>CSS3</h3>
                    <p>تصميم متجاوب وحركات</p>

    <section id="contact" class="contact-form">
  <div class="container">
      <form action='https://forms.zohopublic.com/ahmedgha1/form/Contactme/formperma/tSQ2Ijeq2VxH8f01fcOCn3HfVKudEZcC3qbEYhL74e4/htmlRecords/submit' 
            name='contactForm' 
            id='contactForm' 
            method='POST' 
            onSubmit='javascript:document.charset="UTF-8"; return zf_ValidateAndSubmit();' 
            accept-charset='UTF-8' 
            enctype='multipart/form-data'>

          <!-- Hidden Fields -->
          <input type="hidden" name="zf_referrer_name" value="">
          <input type="hidden" name="zf_redirect_url" value="">
          <input type="hidden" name="zc_gad" value="">

          <h2>اتصل بي</h2>

          <div class="form-group">
              <label for="contactEmail">البريد الإلكتروني <em class="required">*</em></label>
              <input type="email" 
                     id="contactEmail"
                     name="Email" 
                     maxlength="255" 
                     fieldType="9" 
                     placeholder="youremail@example.com" 
                     required>
          </div>

          <div class="form-group">
              <label for="contactPhone">رقم الاتصال</label>
              <input type="tel" 
                     id="contactPhone"
                     name="PhoneNumber_countrycode" 
                     maxlength="20" 
                     fieldType="11" 
                     placeholder="050-001-2344">
          </div>

          <div class="form-group">
              <label for="contactFirstName">الأسم الأول <em class="required">*</em></label>
              <input type="text" 
                     id="contactFirstName"
                     name="Name_First" 
                     maxlength="255" 
                     fieldType="7" 
                     required>
          </div>

          <div class="form-group">
              <label for="contactLastName">العائلة <em class="required">*</em></label>
              <input type="text" 
                     id="contactLastName"
                     name="Name_Last" 
                     maxlength="255" 
                     fieldType="7" 
                     required>
          </div>

          <div class="form-group">
              <label for="contactMessage">الرسالة <em class="required">*</em></label>
              <textarea id="contactMessage"
                       name="MultiLine" 
                       maxlength="65535" 
                       placeholder="اكتب رسالتك هنا على ان لا تقل عن عشرة كلمات"
                       required></textarea>
          </div>

          <button type="submit">إرسال الرسالة</button>
      </form>
  </div>
</section>

      <section id="share-idea" class="zf-templateWrapper">
  <div class="container">
      <ul class="zf-tempHeadBdr">
          <li class="zf-tempHeadContBdr">
              <h2 class="zf-frmTitle"><em>شاركني فكرتك</em></h2>
              <p class="zf-frmDesc">شاركني فكرة مشروعك وسأساعدك في تحقيقها</p>
              <div class="zf-clearBoth"></div>
          </li>
      </ul>

      <div class="zf-subContWrap zf-topAlign">
          <form action='https://forms.zohopublic.com/ahmedgha1/form/Untitled/formperma/Um8kgEsB0NSN_JUj0VKjm2LBp4yhk9zHC7iPYyWjB2o/htmlRecords/submit' 
                name='ideaForm' 
                id='ideaForm' 
                method='POST' 
                onSubmit='javascript:document.charset="UTF-8"; return zf_ValidateAndSubmit();' 
                accept-charset='UTF-8' 
                enctype='multipart/form-data'
                class="zf-large">

              <!-- Hidden Fields -->
              <input type="hidden" name="zf_referrer_name" value="">
              <input type="hidden" name="zf_redirect_url" value="">
              <input type="hidden" name="zc_gad" value="">

              <!-- Email Field -->
              <div class="zf-tempFrmWrapper">
                  <label class="zf-labelName">
                      البريد الإلكتروني 
                      <em class="zf-important">*</em>
                  </label>
                  <div class="zf-tempContDiv">
                      <input type="email" 
                             id="ideaEmail"
                             name="Email" 
                             fieldType="9"
                             maxlength="255" 
                             placeholder="your@email.com"
                             required>
                  </div>
              </div>

              <!-- Name Fields -->
              <div class="zf-tempFrmWrapper zf-name zf-namelarge">
                  <div class="zf-tempContDiv zf-twoType">
                      <div class="zf-nameWrapper">
                          <span>
                              <input type="text" 
                                     id="ideaFirstName"
                                     name="Name_First" 
                                     fieldType="7"
                                     maxlength="255" 
                                     required>
                              <label>الأسم الأول</label>
                          </span>
                          <span>
                              <input type="text" 
                                     id="ideaLastName"
                                     name="Name_Last" 
                                     fieldType="7"
                                     maxlength="255" 
                                     required>
                              <label>العائلة</label>
                          </span>
                      </div>
                  </div>
              </div>

              <!-- Project Title -->
              <div class="zf-tempFrmWrapper">
                  <label class="zf-labelName">
                      عنوان المشروع 
                      <em class="zf-important">*</em>
                  </label>
                  <div class="zf-tempContDiv">
                      <input type="text" 
                             id="projectTitle"
                             name="SingleLine" 
                             fieldType="1"
                             maxlength="255" 
                             required>
                  </div>
              </div>

              <!-- Project Description -->
              <div class="zf-tempFrmWrapper">
                  <label class="zf-labelName">
                      وصف المشروع 
                      <em class="zf-important">*</em>
                  </label>
                  <div class="zf-tempContDiv">
                      <textarea id="projectDesc"
                                name="MultiLine" 
                                maxlength="65535" 
                                required></textarea>
                  </div>
              </div>

              <!-- Expected Budget -->
              <div class="zf-tempFrmWrapper zf-currency">
                  <label class="zf-labelName">
                      الميزانية المتوقعة 
                      <em class="zf-important">*</em>
                  </label>
                  <div class="zf-tempContDiv">
                      <div>
                          <input type="text" 
                                 id="budget"
                                 name="Currency" 
                                 fieldType="3"
                                 maxlength="50" 
                                 required>
                          <span class="zf-symbol">﷼</span>
                      </div>
                  </div>
              </div>

              <!-- Due Date -->
              <div class="zf-tempFrmWrapper">
                  <label class="zf-labelName">
                      التاريخ المتوقع للتسليم
                  </label>
                  <div class="zf-tempContDiv">
                      <input type="date" 
                             id="dueDate"
                             name="Date" 
                             maxlength="25">
                  </div>
              </div>

              <!-- Submit Button -->
              <div class="zf-fmFooter">
                  <button type="submit" class="zf-submitColor">إرسال فكرة المشروع</button>
              </div>
          </form>
      </div>
  </div>
</section>
    
    <footer>
        <div class="container">
            <p>جميع الحقوق محفوظة &copy; ٢٠٢٤ Ghafli</p>
        </div>
    </footer>

    <script>

        // Navigation Toggle
                const navToggle = document.querySelector('.nav-toggle');
                const nav = document.querySelector('nav');

                if (navToggle) {
                navToggle.addEventListener('click', () => {
                    nav.classList.toggle('active');
                    navToggle.classList.toggle('active');
                });
                }

                // Close menu when clicking outside
                document.addEventListener('click', (e) => {
                if (nav.classList.contains('active') && 
                    !e.target.closest('nav') && 
                    !e.target.closest('.nav-toggle')) {
                    nav.classList.remove('active');
                    navToggle.classList.remove('active');
                }
                });

                // Close menu when clicking a link
                document.querySelectorAll('nav a').forEach(link => {
                link.addEventListener('click', () => {
                    nav.classList.remove('active');
                    navToggle.classList.remove('active');
                });
                });

                // Add smooth scroll offset for fixed header
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    const headerOffset = 70;
                    const elementPosition = target.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                });
                });
                    <!-- Validation Script -->
              var zf_DateRegex = new RegExp("^(([0][1-9])|([1-2][0-9])|([3][0-1]))[-](Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[-](?:(?:19|20)[0-9]{2})$");
                    var zf_MonthYearRegex = new RegExp("^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[-](?:(?:19|20)[0-9]{2})$");
                    var zf_MandArray = ["Email", "Name_First", "SingleLine", "MultiLine", "Currency"]; 
                    var zf_FieldArray = ["Email", "Name_First", "Name_Last", "SingleLine", "MultiLine", "Currency", "Date"]; 
                    var isSalesIQIntegrationEnabled = false;
                    var salesIQFieldsArray = [];
        </script>
</body>
</html>
