    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Flashcard App</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Admin Dashboard</h1>
            <button id="logoutBtn" class="btn">Logout</button>
        </header>

        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="totalUsers">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Categories</h3>
                <p id="totalCategories">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Flashcards</h3>
                <p id="totalFlashcards">0</p>
            </div>
        </div>

        <div class="admin-sections">
            <!-- Users Section -->
            <section class="admin-section">
                <h2>Users Management</h2>
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Categories Section -->
            <section class="admin-section">
                <h2>Categories Management</h2>
                <button id="addCategoryBtn" class="btn">Add Category</button>
                <div class="table-container">
                    <table id="categoriesTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Flashcards</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Flashcards Section -->
            <section class="admin-section">
                <h2>Flashcards Management</h2>
                <button id="addFlashcardBtn" class="btn">Add Flashcard</button>
                <div class="table-container">
                    <table id="flashcardsTable">
                        <thead>
                            <tr>
                                <th>Word</th>
                                <th>Definition</th>
                                <th>Category</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="addCategoryModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Category</h2>
            <form id="addCategoryForm">
                <div class="form-group">
                    <label for="categoryName">Name:</label>
                    <input type="text" id="categoryName" required>
                </div>
                <div class="form-group">
                    <label for="categoryDescription">Description:</label>
                    <textarea id="categoryDescription"></textarea>
                </div>
                <button type="submit" class="btn">Add Category</button>
            </form>
        </div>
    </div>

    <!-- Add Flashcard Modal -->
    <div id="addFlashcardModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Flashcard</h2>
            <form id="addFlashcardForm">
                <div class="form-group">
                    <label for="flashcardWord">Word:</label>
                    <input type="text" id="flashcardWord" required>
                </div>
                <div class="form-group">
                    <label for="flashcardDefinition">Definition:</label>
                    <textarea id="flashcardDefinition" required></textarea>
                </div>
                <div class="form-group">
                    <label for="flashcardCategory">Category:</label>
                    <select id="flashcardCategory" required>
                        <option value="">Select Category</option>
                    </select>
                </div>
                <button type="submit" class="btn">Add Flashcard</button>
            </form>
        </div>
    </div>

    <!-- Edit Flashcard Modal -->
    <div id="editFlashcardModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Flashcard</h2>
            <form id="editFlashcardForm">
                <input type="hidden" id="editFlashcardId">
                <div class="form-group">
                    <label for="editFlashcardWord">Word:</label>
                    <input type="text" id="editFlashcardWord" required>
                </div>
                <div class="form-group">
                    <label for="editFlashcardDefinition">Definition:</label>
                    <textarea id="editFlashcardDefinition" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editFlashcardCategory">Category:</label>
                    <select id="editFlashcardCategory" required>
                        <option value="">Select Category</option>
                    </select>
                </div>
                <button type="submit" class="btn">Update Flashcard</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
