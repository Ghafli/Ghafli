<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Flashcard App</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Admin Dashboard</h1>
            <button id="logoutBtn" class="admin-btn">Logout</button>
        </header>

        <nav class="admin-nav">
            <button class="nav-btn active" data-section="overview">Overview</button>
            <button class="nav-btn" data-section="users">Users</button>
            <button class="nav-btn" data-section="categories">Categories</button>
            <button class="nav-btn" data-section="flashcards">Flashcards</button>
        </nav>

        <main class="admin-main">
            <!-- Overview Section -->
            <section id="overview" class="admin-section active">
                <h2>System Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="totalUsers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Categories</h3>
                        <p id="totalCategories">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Flashcards</h3>
                        <p id="totalFlashcards">0</p>
                    </div>
                </div>
            </section>

            <!-- Users Section -->
            <section id="users" class="admin-section">
                <h2>User Management</h2>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Categories Section -->
            <section id="categories" class="admin-section">
                <h2>Category Management</h2>
                <div class="admin-actions">
                    <button id="addCategoryBtn" class="admin-btn">Add Category</button>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Flashcards Count</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody">
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Flashcards Section -->
            <section id="flashcards" class="admin-section">
                <h2>Flashcard Management</h2>
                <div class="admin-actions">
                    <button id="addFlashcardBtn" class="admin-btn">Add Flashcard</button>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Word</th>
                                <th>Definition</th>
                                <th>Category</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="flashcardsTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Category Modal -->
    <div id="addCategoryModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Category</h2>
            <form id="addCategoryForm">
                <div class="form-group">
                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" required>
                </div>
                <div class="form-group">
                    <label for="categoryDescription">Description (Optional)</label>
                    <textarea id="categoryDescription" rows="3"></textarea>
                </div>
                <button type="submit" class="admin-btn">Add Category</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
